<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    <h3>Sign Up</h3>
    <form action="./index2.html" method="get">
        <label for="username">Enter Username: </label><br>
            <input type="text" id="username" name="username" required placeholder="username" pattern="[a-zA-Z0-9._]+" title="Enter the username in this pattern [a-zA-Z0-9._]+ "><br><br>
             <label for="password">Enter Password: </label><br>
            <input type="password" id="password" name="password" required placeholder="password" pattern="[A-Z][a-zA-Z0-9!@#$%^&*]{8,16}" title="Enter the password in 8 to 16 characters"><br><br>
            <label for="password">Confirm Password: </label><br>
            <input type="password" id="password" name="password" required placeholder="confirm password" pattern="[A-Z][a-zA-Z0-9!@#$%^&*]{8,16}" title="Enter the password in 8 to 16 characters"><br><br>
      <input type="submit" value="Sign Up"><br><br>
     
    </form>
</body>
</html>
